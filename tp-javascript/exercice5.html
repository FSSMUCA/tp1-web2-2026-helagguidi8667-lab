<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>TP JavaScript</title>
  </head>
  <body>
    <h1>Ma fiche de présentation</h1>
    <p id="nomComplet"></p>
    <p id="age"></p>
    <p id="ville"></p>
    <p id="presentation"></p>
    <script>
      let prenom = "Hafsa"; 
      let nom = "Elagguidi";
      let age = 18;
      let ville = "Marrakech";
      document.getElementById("nomComplet").innerHTML = nom + " " +prenom;
      document.getElementById("age").innerHTML = age;
      document.getElementById("ville").innerHTML = ville;
      document.getElementById("presentation").innerHTML = `Je m appelle ${nom}, ${prenom}, j'ai ${age} ans et j'habite a ${ville}. `;
      
      document.title = "Fiche de " + prenom;

    </script>
  </body>
</html>
